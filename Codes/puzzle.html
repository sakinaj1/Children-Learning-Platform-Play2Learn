<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puzzle Master</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #cbd5e1 0%, #e2e8f0 25%, #f1f5f9 50%, #fae8ff 100%);
            --tile-purple: linear-gradient(180deg, #a855f7 0%, #7c3aed 100%);
            --tile-correct: linear-gradient(180deg, #f0fdf4 0%, #bbf7d0 100%);
        }

        body {
            font-family: 'Nunito', sans-serif;
            margin: 0;
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* HEADER AREA */
        .header {
            width: 95%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 20px;
        }

        .title-group h1 { color: #2563eb; margin: 0; font-size: 2.5rem; font-weight: 900; }
        .title-group p { color: #3b82f6; margin: 0; font-weight: 700; font-size: 1.2rem; }

        .stats { display: flex; gap: 15px; align-items: center; }
        .stat-box {
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 80px;
            font-size: 1.2rem;
        }
        .stars { background: #facc15; color: #1e1b4b; box-shadow: 0 5px 0 #ca8a04; }
        .moves { background: #3b82f6; color: white; box-shadow: 0 5px 0 #1d4ed8; }

        .home-btn {
            background: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.5rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .home-btn:hover { transform: scale(1.1); background: #f8fafc; }

        /* LARGER GAME BOARD */
        .white-card {
            background: white;
            padding: 60px; /* Increased padding */
            border-radius: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.08);
            margin-top: 10px;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(3, 130px); /* Bigger tiles */
            grid-template-rows: repeat(3, 130px);
            gap: 20px;
        }

        .tile {
            width: 130px;
            height: 130px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-weight: 900;
            font-size: 1.8rem;
            color: white;
            transition: transform 0.1s;
            user-select: none;
            border: none;
        }

        .tile:active { transform: scale(0.95); }

        .tile.wrong { background: var(--tile-purple); box-shadow: 0 8px 0 #5b21b6; }
        .tile.correct { 
            background: var(--tile-correct); 
            color: #166534; 
            box-shadow: 0 8px 0 #86efac; 
            border: 3px solid #22c55e; 
        }
        .tile.empty { background: #f1f5f9; cursor: default; box-shadow: inset 0 4px 10px rgba(0,0,0,0.05); }

        .tile span { font-size: 3rem; margin-bottom: 5px; } /* Bigger emojis */

        /* FOOTER TIP */
        .footer-tip {
            margin-top: 40px;
            background: #dbeafe;
            color: #1e40af;
            padding: 15px 40px;
            border-radius: 20px;
            font-weight: 800;
            border: 1px solid #bfdbfe;
            box-shadow: 0 4px 0 #bfdbfe;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="title-group">
            <h1>🧩 Puzzle Master</h1>
            <p>Arrange the pieces in order!</p>
        </div>
        <div class="stats">
            <div class="stat-box stars">⭐ <span id="star-count">0</span></div>
            <div class="stat-box moves">Moves: <span id="move-count">0</span></div>
            <button class="home-btn" onclick="window.location.href='games.html'">🏠</button>
        </div>
    </div>

    <div class="white-card">
        <div class="game-grid" id="board"></div>
        <div style="display:flex; justify-content:center; padding-top:20px;">
            <button class="btn" id="hintBtn" onclick="showHint('Click a piece next to the empty space to slide it and arrange the animals!')" style="display:none; background:#facc15; box-shadow:0 6px 0 #ca8a04; color:#1e1b4b; font-weight:900; padding:10px 20px; border-radius:12px; border:none; cursor:pointer; font-size:1.1rem;">💡 Show Hints</button>
        </div>
    </div>

    <script>
        const animals = ["🦁", "🐘", "🦒", "🦊", "🐻", "🐼", "🐨", "🐯"];
        let boardState = [1, 2, 3, 4, 5, 6, 7, 8, null];
        let moves = 0;
        let stars = parseInt(localStorage.getItem('stars')) || 12; // Matches your dash

        document.getElementById('star-count').innerText = stars;

        function shuffle() {
            // Simulated shuffle for demo
            for (let i = 0; i < 150; i++) {
                const emptyIdx = boardState.indexOf(null);
                const neighbors = getNeighbors(emptyIdx);
                const randomNeighbor = neighbors[Math.floor(Math.random() * neighbors.length)];
                swap(emptyIdx, randomNeighbor);
            }
            moves = 0;
            updateUI();
        }

        function getNeighbors(idx) {
            const neighbors = [];
            const row = Math.floor(idx / 3);
            const col = idx % 3;
            if (row > 0) neighbors.push(idx - 3);
            if (row < 2) neighbors.push(idx + 3);
            if (col > 0) neighbors.push(idx - 1);
            if (col < 2) neighbors.push(idx + 1);
            return neighbors;
        }

        function swap(idx1, idx2) {
            [boardState[idx1], boardState[idx2]] = [boardState[idx2], boardState[idx1]];
        }

        function handleMove(idx) {
            const emptyIdx = boardState.indexOf(null);
            const neighbors = getNeighbors(emptyIdx);
            
            if (neighbors.includes(idx)) {
                swap(idx, emptyIdx);
                moves++;
                updateUI();
                checkWin();
            }
        }

        function updateUI() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            document.getElementById('move-count').innerText = moves;

            boardState.forEach((val, idx) => {
                const div = document.createElement('div');
                div.className = 'tile';
                
                if (val === null) {
                    div.classList.add('empty');
                } else {
                    div.innerHTML = `<span>${animals[val-1]}</span>${val}`;
                    if (val === idx + 1) {
                        div.classList.add('correct');
                    } else {
                        div.classList.add('wrong');
                    }
                    div.onclick = () => handleMove(idx);
                }
                board.appendChild(div);
            });
        }

        function checkWin() {
            const win = boardState.every((val, i) => i === 8 ? val === null : val === i + 1);
            if (win && moves > 0) {
                stars += 20;
                localStorage.setItem('stars', stars);
                document.getElementById('star-count').innerText = stars;
                alert("🎉 Amazing! You earned 20 stars! Saving...");
                fetch("/submit_score", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ game: 'puzzle', score: 100, stars: 20, time_spent: Math.floor(performance.now() / 1000) })
                }).then(() => {
                    window.location.href = "rewards.html";
                });
            }
        }

        shuffle();

        // Hint logic
        document.addEventListener("DOMContentLoaded", () => {
            let hintsOn = localStorage.getItem('showHints');
            hintsOn = (hintsOn === null) ? true : JSON.parse(hintsOn);
            if (hintsOn) document.getElementById('hintBtn').style.display = 'block';
        });
        function showHint(msg) {
            document.getElementById('hintText').innerText = msg;
            document.getElementById('hintModal').style.display = 'flex';
        }
        function closeHint() {
            document.getElementById('hintModal').style.display = 'none';
        }
    </script>

<!-- Custom Hint Modal -->
<div id="hintModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:9999; justify-content:center; align-items:center;">
    <div style="background:white; padding:30px; border-radius:24px; box-shadow:0 10px 40px rgba(0,0,0,0.25); max-width:400px; width:90%; text-align:center; transform: scale(1); animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
        <h2 style="margin-top:0; color:#2563eb; font-size:2rem; font-weight:900;">💡 HINT</h2>
        <p id="hintText" style="font-size:1.3rem; color:#475569; margin:20px 0; font-weight:800; line-height:1.5;"></p>
        <button onclick="closeHint()" style="background:#facc15; color:#1e1b4b; border:none; padding:12px 35px; border-radius:15px; font-weight:900; font-size:1.2rem; cursor:pointer; box-shadow:0 6px 0 #ca8a04; transition: all 0.2s;">Got It!</button>
    </div>
</div>

<style>
@keyframes popIn {
    0% { transform: scale(0.8); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}
</style>

</body>
</html>

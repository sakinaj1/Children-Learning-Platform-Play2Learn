<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Number Ninja – KidLearn</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
    * { box-sizing: border-box; font-family: 'Nunito', sans-serif; }
    body { background: #4ade80; min-height: 100vh; display: flex; flex-direction: column; margin: 0; }

    .top-bar {
        display: flex; align-items: center; justify-content: space-between;
        padding: 18px 24px 8px;
    }
    .game-title {
        display: flex; align-items: center; gap: 10px;
        font-size: 1.6rem; font-weight: 900; color: #1a3a1a;
    }
    .game-logo2 {
        background: #3b82f6; border-radius: 10px; padding: 6px 10px;
        color: white; font-size: 0.9rem; font-weight: 900; line-height: 1;
    }
    .star-counter2 {
        display: flex; align-items: center; gap: 6px;
        background: #facc15; border: 2px solid #f59e0b;
        border-radius: 12px; padding: 8px 16px;
        font-size: 1.2rem; font-weight: 900; color: #713f12;
    }

    /* PROGRESS BAR FIXED */
    .prog-bar {
        display: flex; align-items: center; gap: 14px;
        margin: 0 24px 14px;
        background: white; border-radius: 12px; padding: 10px 20px;
    }
    .prog-track { flex: 1; height: 14px; background: #e5e7eb; border-radius: 999px; overflow: hidden; }
    .prog-fill { 
        height: 100%; 
        background: #1a1a1a; /* Dark like the reference */
        border-radius: 999px; 
        transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        width: 0%; 
    }

    /* MAIN CARD */
    .main-card {
        margin: 0 24px 24px; background: white; border-radius: 22px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.10); padding: 28px 28px 24px;
        flex: 1; display: flex; flex-direction: column;
        position: relative;
    }

    .confetti-container { position: absolute; inset: 0; pointer-events: none; overflow: hidden; border-radius: 22px; }
    .confetti-dot {
        position: absolute; border-radius: 2px;
        animation: fall2 linear infinite;
    }
    @keyframes fall2 {
        0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
        100% { transform: translateY(500px) rotate(720deg); opacity: 0; }
    }

    .question {
        text-align: center; font-size: 1.8rem; font-weight: 900; color: #1e1b4b;
        margin-bottom: 28px;
    }

    /* Answer grid */
    .answer-grid {
        display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
        flex: 1;
    }
    .answer-btn {
        border: none; border-radius: 20px;
        font-size: 3.5rem; font-weight: 900; cursor: pointer;
        transition: all 0.2s; color: white;
        display: flex; align-items: center; justify-content: center;
        min-height: 120px; background: #93c5fd;
    }
    .answer-btn:hover { transform: scale(1.03); background: #60a5fa; }
    .answer-btn.correct { background: #22c55e !important; animation: pulse 0.4s ease; }
    .answer-btn.wrong   { background: #ef4444 !important; animation: shake 0.4s ease; }

    @keyframes pulse { 0%{transform:scale(1)} 50%{transform:scale(1.06)} 100%{transform:scale(1)} }
    @keyframes shake { 0%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} 100%{transform:translateX(0)} }

    /* Feedback */
    .feedback {
        text-align: center; font-size: 1.3rem; font-weight: 900;
        padding-top: 18px; min-height: 44px;
        display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .feedback.correct-msg { color: #15803d; }
    .feedback.wrong-msg   { color: #dc2626; }

    .owl { position: fixed; bottom: 20px; right: 20px; font-size: 2.8rem; animation: bounce 2s infinite; }
    @keyframes bounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }

    .home-btn2 {
        background: white; border: 2px solid #e5e7eb; border-radius: 12px;
        padding: 8px 14px; cursor: pointer; font-size: 1.1rem; text-decoration: none;
        display: flex; align-items: center; gap: 6px; font-weight: 700; color: #333;
    }
</style>
</head>
<body>

<div class="top-bar">
    <div class="game-title">
        <div class="game-logo2">1 2<br>3 4</div>
        Number Ninja
    </div>
    <div style="display:flex;gap:10px;align-items:center;">
        <div class="star-counter2" id="starCount">⭐ 0</div>
        <a href="games.html" class="home-btn2">🏠</a>
    </div>
</div>

<div class="prog-bar">
    <span style="font-weight:800;color:#374151;white-space:nowrap;">Progress:</span>
    <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
    <span style="font-weight:800;color:#374151;" id="progCount">0/5</span>
</div>

<div class="main-card">
    <div class="confetti-container" id="confettiContainer"></div>
    <div class="question" id="question">Loading...</div>
    <div class="answer-grid" id="answerGrid"></div>
    <div class="feedback" id="feedback"></div>
    <div style="display:flex; justify-content:center; padding-top:20px;">
        <button class="btn" id="hintBtn" onclick="showHint('Count the objects you see and click the right number!')" style="display:none; background:#facc15; box-shadow:0 6px 0 #ca8a04; color:#1e1b4b; font-weight:900; padding:10px 20px; border-radius:12px; border:none; cursor:pointer;">💡 Show Hints</button>
    </div>
</div>

<div class="owl">🦉</div>

<script>
const questions = [
    { q:'How many stars? ⭐ ⭐', ans:2 },
    { q:'How many apples? 🍎 🍎 🍎', ans:3 },
    { q:'How many balloons? 🎈 🎈 🎈 🎈', ans:4 },
    { q:'How many hearts? ❤️ ❤️', ans:2 },
    { q:'How many flowers? 🌸 🌸 🌸 🌸 🌸', ans:5 },
];

let qIdx = 0;
const totalQs = questions.length;
let stars = parseInt(localStorage.getItem('stars') || '0');
let answered = false;

document.getElementById('starCount').textContent = '⭐ ' + stars;

function loadQuestion() {
    if (qIdx >= totalQs) {
        showGameOver();
        return;
    }

    answered = false;
    document.getElementById('feedback').textContent = '';
    document.getElementById('feedback').className = 'feedback';
    document.getElementById('confettiContainer').innerHTML = '';

    const q = questions[qIdx];
    document.getElementById('question').textContent = q.q;

    // UPDATE PROGRESS BAR CORRECTLY
    const progressNumber = qIdx + 1;
    const pct = (progressNumber / totalQs) * 100;
    document.getElementById('progFill').style.width = pct + '%';
    document.getElementById('progCount').textContent = progressNumber + '/' + totalQs;

    // Generate choices
    const choices = generateChoices(q.ans, 4);
    const grid = document.getElementById('answerGrid');
    grid.innerHTML = '';
    choices.forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'answer-btn';
        btn.textContent = c;
        btn.onclick = () => checkAnswer(btn, c, q.ans);
        grid.appendChild(btn);
    });
}

function generateChoices(ans, n) {
    const set = new Set([ans]);
    while (set.size < n) {
        const v = Math.max(1, ans + Math.floor(Math.random() * 5) - 2);
        set.add(v);
    }
    return [...set].sort(() => Math.random() - 0.5);
}

function checkAnswer(btn, chosen, correct) {
    if (answered) return;
    const fb = document.getElementById('feedback');

    if (chosen === correct) {
        answered = true;
        btn.classList.add('correct');
        stars += 20;
        localStorage.setItem('stars', stars);
        document.getElementById('starCount').textContent = '⭐ ' + stars;
        fb.textContent = '🎉 Correct! +20 Stars!';
        fb.className = 'feedback correct-msg';
        showConfetti();
        
        qIdx++; // Move to next
        setTimeout(loadQuestion, 1500);
    } else {
        btn.classList.add('wrong');
        fb.textContent = '❌ Try again!';
        fb.className = 'feedback wrong-msg';
        setTimeout(() => { 
            btn.classList.remove('wrong'); 
            fb.textContent = ''; 
        }, 800);
    }
}

function showGameOver() {
    document.getElementById('question').textContent = "You're a Number Ninja! 🥷";
    document.getElementById('answerGrid').innerHTML = `
        <div style="grid-column: span 2; text-align:center;">
            <h2 style="color:white; font-size:2rem;">Saving progress...</h2>
        </div>
    `;
    document.getElementById('feedback').textContent = "Total Stars: " + stars;

    setTimeout(() => {
        fetch("/submit_score", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ game: 'numbers', score: 100, stars: 100, time_spent: Math.floor(performance.now() / 1000) })
        }).then(() => {
            window.location.href = "rewards.html";
        });
    }, 1500);
}

const confColors = ['#f43f5e','#f97316','#facc15','#22c55e','#3b82f6','#a855f7','#ec4899'];
function showConfetti() {
    const c = document.getElementById('confettiContainer');
    for (let i=0; i<30; i++) {
        const d = document.createElement('div');
        d.className = 'confetti-dot';
        d.style.left = Math.random()*100+'%';
        d.style.background = confColors[Math.floor(Math.random()*confColors.length)];
        d.style.animationDuration = (1+Math.random()*2)+'s';
        const sz = 6+Math.random()*8;
        d.style.width = sz+'px'; d.style.height = sz+'px';
        c.appendChild(d);
    }
}

// Initial Load
loadQuestion();

// Hint logic
document.addEventListener("DOMContentLoaded", () => {
    let hintsOn = localStorage.getItem('showHints');
    hintsOn = (hintsOn === null) ? true : JSON.parse(hintsOn);
    if (hintsOn) document.getElementById('hintBtn').style.display = 'block';
});
function showHint(msg) {
    document.getElementById('hintText').innerText = msg;
    document.getElementById('hintModal').style.display = 'flex';
}
function closeHint() {
    document.getElementById('hintModal').style.display = 'none';
}
</script>

<!-- Custom Hint Modal -->
<div id="hintModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:9999; justify-content:center; align-items:center;">
    <div style="background:white; padding:30px; border-radius:24px; box-shadow:0 10px 40px rgba(0,0,0,0.25); max-width:400px; width:90%; text-align:center; transform: scale(1); animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
        <h2 style="margin-top:0; color:#2563eb; font-size:2rem; font-weight:900;">💡 HINT</h2>
        <p id="hintText" style="font-size:1.3rem; color:#475569; margin:20px 0; font-weight:800; line-height:1.5;"></p>
        <button onclick="closeHint()" style="background:#facc15; color:#1e1b4b; border:none; padding:12px 35px; border-radius:15px; font-weight:900; font-size:1.2rem; cursor:pointer; box-shadow:0 6px 0 #ca8a04; transition: all 0.2s;">Got It!</button>
    </div>
</div>

<style>
@keyframes popIn {
    0% { transform: scale(0.8); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}
</style>

</body>
</html>

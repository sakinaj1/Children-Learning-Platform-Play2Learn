<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shapes Fun – KidLearn</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
    * { box-sizing: border-box; font-family: 'Nunito', sans-serif; }
    body { 
        background: linear-gradient(135deg, #c084fc 0%, #e8d5ff 50%, #fbcfe8 100%); 
        min-height: 100vh; display: flex; flex-direction: column; margin: 0; padding: 10px;
    }

    /* HEADER AREA */
    .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; }
    .game-title { display: flex; align-items: center; gap: 10px; font-size: 1.8rem; font-weight: 900; color: #4338ca; }
    .game-logo-shapes { font-size: 1.5rem; }
    
    .star-counter2 {
        background: #facc15; border: 2px solid #eab308;
        border-radius: 12px; padding: 8px 20px;
        font-size: 1.2rem; font-weight: 900; color: #713f12;
        box-shadow: 0 4px 0 #ca8a04;
    }
    .home-btn {
        background: white; border-radius: 10px; width: 45px; height: 40px;
        display: flex; align-items: center; justify-content: center;
        text-decoration: none; box-shadow: 0 4px 0 #e5e7eb; border: 1px solid #e5e7eb;
    }

    /* PROGRESS BAR */
    .prog-container {
        background: white; border-radius: 20px; margin: 0 20px 20px;
        padding: 8px 20px; display: flex; align-items: center; gap: 15px;
    }
    .prog-track { flex: 1; height: 12px; background: #e5e7eb; border-radius: 10px; overflow: hidden; }
    .prog-fill { 
        height: 100%; background: #1a1a1a; width: 0%; 
        transition: width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
    }
    .prog-text { font-weight: 800; color: #4338ca; }

    /* MAIN CARD */
    .main-card {
        margin: 0 20px 20px; background: white; border-radius: 24px;
        padding: 30px; flex: 1; display: flex; flex-direction: column;
        align-items: center; box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        position: relative; overflow: hidden;
    }

    .confetti-container { position: absolute; inset: 0; pointer-events: none; }
    .confetti-dot { position: absolute; border-radius: 2px; animation: fall linear infinite; }
    @keyframes fall { 0%{transform:translateY(-20px) rotate(0deg); opacity: 1;} 100%{transform:translateY(600px) rotate(720deg); opacity: 0;} }

    .shape-question { font-size: 2rem; font-weight: 900; color: #1e1b4b; margin-bottom: 20px; }

    .shape-display {
        width: 160px; height: 160px; margin-bottom: 40px;
        display: flex; align-items: center; justify-content: center;
    }
    .shape-svg { width: 140px; height: 140px; filter: drop-shadow(0 8px 12px rgba(0,0,0,0.15)); }

    /* CHOICE BUTTONS (Gradient Style like photo) */
    .choices-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; max-width: 550px; }
    
    .choice-btn {
        padding: 25px; border-radius: 15px; border: none;
        background: linear-gradient(to right, #e879f9, #f472b6); /* Pink to Purple */
        cursor: pointer; font-size: 1.4rem; font-weight: 800; color: white;
        transition: all 0.2s; box-shadow: 0 6px 0 #d946ef;
    }
    .choice-btn:hover { transform: translateY(-3px); box-shadow: 0 9px 0 #d946ef; }
    
    /* Correct/Wrong States */
    .choice-btn.correct { 
        background: #4ade80 !important; 
        box-shadow: 0 6px 0 #22c55e !important; 
        animation: pulse 0.4s ease;
    }
    .choice-btn.wrong { 
        background: #f87171 !important; 
        box-shadow: 0 6px 0 #ef4444 !important; 
        animation: shake 0.4s ease;
    }

    @keyframes pulse { 0%{transform:scale(1)} 50%{transform:scale(1.05)} 100%{transform:scale(1)} }
    @keyframes shake { 0%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} 100%{transform:translateX(0)} }

    .feedback { font-size: 1.8rem; font-weight: 900; margin-top: 25px; min-height: 45px; }
</style>
</head>
<body>

<div class="top-bar">
    <div class="game-title">
        <span class="game-logo-shapes">⬜</span> Shapes Game
    </div>
    <div style="display:flex; gap:10px;">
        <div class="star-counter2">⭐ <span id="starCount">0</span></div>
        <a href="games.html" class="home-btn">🏠</a>
    </div>
</div>

<div class="prog-container">
    <span style="font-weight:900;">Progress:</span>
    <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
    <span class="prog-text" id="progCount">0/5</span>
</div>

<div class="main-card">
    <div class="confetti-container" id="conf"></div>
    
    <div class="shape-question">What shape is this?</div>
    
    <div class="shape-display">
        <svg class="shape-svg" id="shapeSVG" viewBox="0 0 160 160"></svg>
    </div>
    
    <div class="choices-grid" id="choices"></div>
    <div class="feedback" id="fb"></div>
</div>
<div style="display:flex; justify-content:center; padding-top:20px; margin-bottom: 20px;">
    <button class="btn" id="hintBtn" onclick="showHint('Match the shape you see on the screen with its name below!')" style="display:none; background:#facc15; box-shadow:0 6px 0 #ca8a04; color:#1e1b4b; font-weight:900; padding:10px 20px; border-radius:12px; border:none; cursor:pointer;">💡 Show Hints</button>
</div>

<script>
const shapes=[
    {name:'Square', color:'#33334d', draw:()=>`<rect x="15" y="15" width="130" height="130" fill="#33334d" rx="15"/>` },
    {name:'Circle', color:'#33334d', draw:()=>`<circle cx="80" cy="80" r="70" fill="#33334d"/>` },
    {name:'Triangle', color:'#33334d', draw:()=>`<polygon points="80,10 150,150 10,150" fill="#33334d"/>` },
    {name:'Diamond', color:'#33334d', draw:()=>`<polygon points="80,10 150,80 80,150 10,80" fill="#33334d"/>` },
    {name:'Star', color:'#33334d', draw:()=>`<polygon points="80,10 95,60 150,60 105,90 120,145 80,115 40,145 55,90 10,60 65,60" fill="#33334d"/>` },
];

let idx=0;
let stars=parseInt(localStorage.getItem('stars')||'0');
let answered=false;

document.getElementById('starCount').textContent = stars;

function load(){
    if (idx >= shapes.length) {
        showGameOver();
        return;
    }

    answered=false; 
    document.getElementById('fb').textContent=''; 
    document.getElementById('conf').innerHTML='';
    
    const s = shapes[idx];
    document.getElementById('shapeSVG').innerHTML = s.draw();

    // Progress Bar
    const pct = ((idx + 1) / shapes.length) * 100;
    document.getElementById('progFill').style.width = pct + '%';
    document.getElementById('progCount').textContent = (idx+1) + '/' + shapes.length;

    // Generate Choices
    const opts = [s, ...shapes.filter(x=>x!==s).sort(()=>Math.random()-0.5).slice(0,3)].sort(()=>Math.random()-0.5);
    
    const grid = document.getElementById('choices');
    grid.innerHTML = '';
    
    opts.forEach(o => {
        const b = document.createElement('button');
        b.className = 'choice-btn';
        b.textContent = o.name;
        b.onclick = () => check(b, o.name, s.name);
        grid.appendChild(b);
    });
}

function check(btn, chosen, correct) {
    if(answered) return;
    const fb = document.getElementById('fb');

    if(chosen === correct) {
        answered = true;
        btn.classList.add('correct');
        stars += 20;
        localStorage.setItem('stars', stars);
        document.getElementById('starCount').textContent = stars;
        fb.innerHTML = '🎉 Perfect! +20 Stars!';
        fb.style.color = "#22c55e";
        
        confettiEffect();
        idx++;
        setTimeout(load, 1800);
    } else {
        btn.classList.add('wrong');
        fb.innerHTML = '❌ Oops! Try again!';
        fb.style.color = "#ef4444";
        setTimeout(() => {
            btn.classList.remove('wrong');
            fb.textContent = '';
        }, 800);
    }
}

function showGameOver() {
    document.querySelector('.shape-question').textContent = "Excellent Work! 🏆";
    document.getElementById('shapeSVG').innerHTML = "";
    document.getElementById('choices').innerHTML = `
        <h2 style="color:#333; grid-column:span 2; text-align:center;">Saving progress...</h2>
    `;
    document.getElementById('fb').textContent = "You mastered all shapes!";

    setTimeout(() => {
        fetch("/submit_score", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ game: 'shapes', score: 100, stars: 100, time_spent: Math.floor(performance.now() / 1000) })
        }).then(() => {
            window.location.href = "rewards.html";
        });
    }, 1500);
}

function confettiEffect(){
    const c=document.getElementById('conf');
    const cols=['#ff71ce','#01cdfe','#05ffa1','#b967ff','#fffb96'];
    for(let i=0;i<50;i++){
        const d=document.createElement('div');
        d.className='confetti-dot';
        d.style.left=Math.random()*100+'%';
        d.style.top='-10px';
        d.style.background=cols[Math.floor(Math.random()*cols.length)];
        d.style.width=Math.random()*8+4+'px';
        d.style.height=d.style.width;
        d.style.animationDuration=(1+Math.random()*2)+'s';
        c.appendChild(d);
    }
}

load();

// Hint logic
document.addEventListener("DOMContentLoaded", () => {
    let hintsOn = localStorage.getItem('showHints');
    hintsOn = (hintsOn === null) ? true : JSON.parse(hintsOn);
    if (hintsOn) document.getElementById('hintBtn').style.display = 'block';
});
function showHint(msg) {
    document.getElementById('hintText').innerText = msg;
    document.getElementById('hintModal').style.display = 'flex';
}
function closeHint() {
    document.getElementById('hintModal').style.display = 'none';
}
</script>

<!-- Custom Hint Modal -->
<div id="hintModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:9999; justify-content:center; align-items:center;">
    <div style="background:white; padding:30px; border-radius:24px; box-shadow:0 10px 40px rgba(0,0,0,0.25); max-width:400px; width:90%; text-align:center; transform: scale(1); animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
        <h2 style="margin-top:0; color:#2563eb; font-size:2rem; font-weight:900;">💡 HINT</h2>
        <p id="hintText" style="font-size:1.3rem; color:#475569; margin:20px 0; font-weight:800; line-height:1.5;"></p>
        <button onclick="closeHint()" style="background:#facc15; color:#1e1b4b; border:none; padding:12px 35px; border-radius:15px; font-weight:900; font-size:1.2rem; cursor:pointer; box-shadow:0 6px 0 #ca8a04; transition: all 0.2s;">Got It!</button>
    </div>
</div>

<style>
@keyframes popIn {
    0% { transform: scale(0.8); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}
</style>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Colors World – KidLearn</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
    * { box-sizing: border-box; font-family: 'Nunito', sans-serif; }
    body { 
        background: linear-gradient(135deg, #fce7f3 0%, #fdf2f8 50%, #fff7ed 100%); 
        min-height: 100vh; display: flex; flex-direction: column; margin: 0; 
    }

    /* HEADER */
    .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 18px 24px 8px; }
    .game-title { display: flex; align-items: center; gap: 10px; font-size: 1.6rem; font-weight: 900; color: #be185d; }
    .game-logo-colors {
        background: linear-gradient(45deg, #ef4444, #3b82f6, #22c55e);
        border-radius: 10px; padding: 6px 10px; color: white; font-size: 0.9rem; font-weight: 900; line-height: 1;
    }
    .star-counter2 {
        display: flex; align-items: center; gap: 6px; background: #facc15; border: 2px solid #f59e0b;
        border-radius: 12px; padding: 8px 16px; font-size: 1.2rem; font-weight: 900; color: #713f12;
    }

    /* PROGRESS BAR */
    .prog-bar { display: flex; align-items: center; gap: 14px; margin: 0 24px 14px; background: white; border-radius: 12px; padding: 10px 20px; }
    .prog-track { flex: 1; height: 14px; background: #e5e7eb; border-radius: 999px; overflow: hidden; }
    .prog-fill { 
        height: 100%; background: #1a1a1a; border-radius: 999px; 
        transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); width: 0%; 
    }

    /* MAIN CARD (Clean White) */
    .main-card {
        margin: 0 24px 24px; background: white; border-radius: 22px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 28px;
        flex: 1; display: flex; flex-direction: column; align-items: center;
        position: relative; overflow: hidden;
    }

    .confetti-container { position: absolute; inset: 0; pointer-events: none; }
    .confetti-dot { position: absolute; border-radius: 2px; animation: fall3 linear infinite; }
    @keyframes fall3 { 0%{transform:translateY(-20px) rotate(0deg); opacity: 1;} 100%{transform:translateY(500px) rotate(720deg); opacity: 0;} }

    /* OBJECT DISPLAY (White Background) */
    .color-display { 
        width: 180px; height: 180px; 
        margin: 10px auto 10px; 
        display: flex; align-items: center; justify-content: center; 
        font-size: 8rem; 
        background: transparent;
    }

    .color-question { font-size: 1.8rem; font-weight: 900; color: #1e1b4b; margin-bottom: 35px; text-align: center; }

    /* UNIFIED OPTION BUTTONS (All same color) */
    .choices-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; width: 100%; max-width: 440px; }
    
    .choice-btn { 
        padding: 22px; border-radius: 24px; border: none;
        cursor: pointer; font-size: 1.4rem; font-weight: 900; 
        color: #19191a; /* Dark Grey Text */
        background: #80a4c9; /* Soft Grey/White Card */
        transition: all 0.2s; 
        box-shadow: 0 6px 0 #cbd5e1; /* Bottom "3D" effect */
    }
    
    .choice-btn:hover { transform: translateY(-3px); box-shadow: 0 9px 0 #cbd5e1; background: #e2e8f0; }

    /* FEEDBACK STATES */
    .choice-btn.correct { 
        background: #22c55e !important; 
        color: white !important; 
        box-shadow: 0 6px 0 #16a34a !important; 
        animation: pulse 0.4s ease; 
    }
    
    .choice-btn.wrong { 
        background: #ef4444 !important; 
        color: white !important; 
        box-shadow: 0 6px 0 #dc2626 !important; 
        animation: shake 0.4s ease; 
    }

    @keyframes pulse { 0%{transform:scale(1)} 50%{transform:scale(1.08)} 100%{transform:scale(1)} }
    @keyframes shake { 0%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} 100%{transform:translateX(0)} }

    .feedback { font-size: 1.4rem; font-weight: 900; margin-top: 18px; min-height: 40px; }
    
    .home-btn2 {
        background: white; border: 2px solid #e5e7eb; border-radius: 12px;
        padding: 8px 14px; cursor: pointer; font-size: 1.1rem; text-decoration: none;
        display: flex; align-items: center; gap: 6px; font-weight: 700; color: #333;
    }

    .owl { position: fixed; bottom: 20px; right: 20px; font-size: 2.8rem; animation: bounce 2s infinite; }
    @keyframes bounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }
</style>
</head>
<body>

<div class="top-bar">
    <div class="game-title">
        <div class="game-logo-colors">R G<br>B Y</div>
        Colors World
    </div>
    <div style="display:flex;gap:10px;align-items:center;">
        <div class="star-counter2" id="starCount">⭐ 0</div>
        <a href="games.html" class="home-btn2">🏠</a>
    </div>
</div>

<div class="prog-bar">
    <span style="font-weight:800;color:#374151;white-space:nowrap;">Progress:</span>
    <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
    <span style="font-weight:800;color:#374151;" id="progCount">0/6</span>
</div>

<div class="main-card">
    <div class="confetti-container" id="conf"></div>
    <div class="color-display" id="colorDisp">🍎</div>
    <div class="color-question" id="qText">What color is this?</div>
    <div class="choices-grid" id="choices"></div>
    <div class="feedback" id="fb"></div>
    <div style="display:flex; justify-content:center; padding-top:20px;">
        <button class="btn" id="hintBtn" onclick="showHint('Tap the color that matches the name written!')" style="display:none; background:#facc15; box-shadow:0 6px 0 #ca8a04; color:#1e1b4b; font-weight:900; padding:10px 20px; border-radius:12px; border:none; cursor:pointer;">💡 Show Hints</button>
    </div>
</div>

<div class="owl">🦉</div>

<script>
const colors=[
    {name:'Red', hex:'#ef4444', emoji:'🔴'},
    {name:'Blue', hex:'#3b82f6', emoji:'🔵'},
    {name:'Green', hex:'#22c55e', emoji:'🟢'},
    {name:'Yellow', hex:'#facc15', emoji:'🟡'},
    {name:'Purple', hex:'#a855f7', emoji:'🟣'},
    {name:'Orange', hex:'#f97316', emoji:'🟠'},
];

let idx=0;
let stars=parseInt(localStorage.getItem('stars')||'0');
let answered=false;

document.getElementById('starCount').textContent='⭐ '+stars;

function load(){
    if (idx >= colors.length) {
        showGameOver();
        return;
    }

    answered=false; 
    document.getElementById('fb').textContent=''; 
    document.getElementById('conf').innerHTML='';
    
    const c = colors[idx];
    document.getElementById('colorDisp').textContent = c.emoji;

    // Progress
    const progressNumber = idx + 1;
    const pct = (progressNumber / colors.length) * 100;
    document.getElementById('progFill').style.width = pct + '%';
    document.getElementById('progCount').textContent = progressNumber + '/' + colors.length;

    // Generate Choices
    const opts = [c, ...colors.filter(x=>x!==c).sort(()=>Math.random()-0.5).slice(0,3)].sort(()=>Math.random()-0.5);
    
    const grid = document.getElementById('choices');
    grid.innerHTML = '';
    
    opts.forEach(o => {
        const b = document.createElement('button');
        b.className = 'choice-btn';
        b.textContent = o.name;
        // Notice: No background color set here, it uses the CSS default
        b.onclick = () => check(b, o.name, c.name);
        grid.appendChild(b);
    });
}

function check(btn, chosen, correct) {
    if(answered) return;
    const fb = document.getElementById('fb');

    if(chosen === correct) {
        answered = true;
        btn.classList.add('correct');
        stars += 15;
        localStorage.setItem('stars', stars);
        document.getElementById('starCount').textContent = '⭐ ' + stars;
        fb.innerHTML = '<span style="color:#15803d">🌈 Correct! Well Done!</span>';
        
        confetti();
        idx++;
        setTimeout(load, 1500);
    } else {
        btn.classList.add('wrong');
        fb.innerHTML = '<span style="color:#dc2626">Oops! Try again!</span>';
        setTimeout(() => {
            btn.classList.remove('wrong');
            fb.textContent = '';
            answered = false;
        }, 800);
    }
}

function showGameOver() {
    document.getElementById('qText').textContent = "You're a Color Ninja! 🏆";
    document.getElementById('colorDisp').style.display = 'none';
    document.getElementById('choices').innerHTML = `
        <h2 style="color:#333; grid-column:span 2; text-align:center;">Saving progress...</h2>
    `;

    setTimeout(() => {
        fetch("/submit_score", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ game: 'colors', score: 100, stars: 90, time_spent: Math.floor(performance.now() / 1000) })
        }).then(() => {
            window.location.href = "rewards.html";
        });
    }, 1500);
}

function confetti(){
    const c=document.getElementById('conf');
    const cols=['#f43f5e','#f97316','#facc15','#22c55e','#3b82f6','#a855f7'];
    for(let i=0;i<40;i++){
        const d=document.createElement('div');
        d.className='confetti-dot';
        d.style.left=Math.random()*100+'%';
        d.style.background=cols[Math.floor(Math.random()*cols.length)];
        d.style.animationDuration=(1+Math.random()*2)+'s';
        const sz=6+Math.random()*8;
        d.style.width=sz+'px'; d.style.height=sz+'px';
        c.appendChild(d);
    }
}

load();

// Hint logic
document.addEventListener("DOMContentLoaded", () => {
    let hintsOn = localStorage.getItem('showHints');
    hintsOn = (hintsOn === null) ? true : JSON.parse(hintsOn);
    if (hintsOn) document.getElementById('hintBtn').style.display = 'block';
});
function showHint(msg) {
    document.getElementById('hintText').innerText = msg;
    document.getElementById('hintModal').style.display = 'flex';
}
function closeHint() {
    document.getElementById('hintModal').style.display = 'none';
}
</script>

<!-- Custom Hint Modal -->
<div id="hintModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:9999; justify-content:center; align-items:center;">
    <div style="background:white; padding:30px; border-radius:24px; box-shadow:0 10px 40px rgba(0,0,0,0.25); max-width:400px; width:90%; text-align:center; transform: scale(1); animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
        <h2 style="margin-top:0; color:#2563eb; font-size:2rem; font-weight:900;">💡 HINT</h2>
        <p id="hintText" style="font-size:1.3rem; color:#475569; margin:20px 0; font-weight:800; line-height:1.5;"></p>
        <button onclick="closeHint()" style="background:#facc15; color:#1e1b4b; border:none; padding:12px 35px; border-radius:15px; font-weight:900; font-size:1.2rem; cursor:pointer; box-shadow:0 6px 0 #ca8a04; transition: all 0.2s;">Got It!</button>
    </div>
</div>

<style>
@keyframes popIn {
    0% { transform: scale(0.8); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}
</style>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Master - KidLearn</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 50%, #d8b4fe 100%);
            --btn-blue: linear-gradient(180deg, #00c6ff 0%, #0072ff 100%);
            --btn-correct: linear-gradient(180deg, #4ade80 0%, #16a34a 100%);
            --btn-wrong: linear-gradient(180deg, #f87171 0%, #dc2626 100%);
        }

        body {
            font-family: 'Nunito', sans-serif;
            margin: 0;
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-canvas {
            width: 95vw;
            height: 92vh;
            background: white;
            border-radius: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            padding: 30px;
            box-sizing: border-box;
            position: relative;
        }

        /* HEADER & PROGRESS */
        .header { display: flex; justify-content: space-between; align-items: center; }
        .title-group h1 { color: #2563eb; margin: 0; font-size: 2.2rem; font-weight: 900; }
        .stat-box { padding: 8px 18px; border-radius: 12px; font-weight: 800; background: #facc15; box-shadow: 0 4px 0 #ca8a04; }
        
        /* PROGRESS SEGMENTS */
        .progress-container {
            display: flex;
            gap: 8px;
            width: 100%;
            margin: 15px 0 25px;
        }

        .segment {
            flex: 1;
            height: 12px;
            background: #e2e8f0;
            border-radius: 10px;
            transition: 0.4s;
        }

        .segment.active {
            background: #4ade80;
            box-shadow: 0 2px 4px rgba(74, 222, 128, 0.2);
        }

        /* MAIN CONTENT */
        .main-display { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .question-text { font-size: 3.5rem; font-weight: 900; color: #1e1b4b; margin: 0; }
        .visual-aid { display: flex; align-items: center; gap: 20px; margin: 30px 0; font-size: 3.5rem; }

        /* FEEDBACK TEXT */
        #feedback-msg {
            height: 40px;
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        /* BUTTONS */
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 700px; }
        .option-btn {
            background: var(--btn-blue); color: white; border: none; padding: 20px;
            border-radius: 15px; font-size: 2.5rem; font-weight: 900; cursor: pointer;
            box-shadow: 0 8px 0 #0056b3; transition: 0.1s;
        }

        /* DYNAMIC STATES */
        .btn-correct { background: var(--btn-correct) !important; box-shadow: 0 8px 0 #166534 !important; }
        .btn-wrong { background: var(--btn-wrong) !important; box-shadow: 0 8px 0 #991b1b !important; animation: shake 0.4s; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-10px);} 75% {transform: translateX(10px);} }

        .btn-home { text-decoration: none; font-size: 1.5rem; background: white; padding: 10px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .owl-icon { width: 55px; position: absolute; right: 25px; bottom: 25px; }
    </style>
</head>
<body>

<div class="game-canvas">
    <div class="header">
        <div class="title-group"><h1>➕ Math Quiz</h1></div>
        <div style="display:flex; gap:15px; align-items:center;">
            <div class="stat-box" style="background:#3b82f6; color:white; box-shadow:0 4px 0 #1d4ed8;"> <span id="timerDisplay">Q 1/5</span> </div>
            <div class="stat-box">⭐ <span id="star-count">0</span></div>
            <a href="games.html" class="btn-home">🏠</a>
        </div>
    </div>

    <div class="progress-container" id="progressBar"></div>

    <div class="main-display">
        <div class="question-text" id="questionText">1 + 1 = ?</div>
        <div class="visual-aid">
            <span id="groupA">🍎</span> <span>+</span> <span id="groupB">🍎</span>
        </div>

        <div id="feedback-msg"></div>

        <div class="options-grid" id="options"></div>
        <div style="display:flex; justify-content:center; padding-top:20px;">
            <button class="btn" id="hintBtn" onclick="showHint('Count the apples and add them together!')" style="display:none; background:#facc15; box-shadow:0 6px 0 #ca8a04; color:#1e1b4b; font-weight:900; padding:10px 20px; border-radius:12px; border:none; cursor:pointer;">💡 Show Hints</button>
        </div>
    </div>

    <img src="https://cdn-icons-png.flaticon.com/512/3504/3504364.png" class="owl-icon">
</div>

<script>
    let currentStep = 1;
    let stars = parseInt(localStorage.getItem('stars')) || 0;
    let correctAnswer = 0;
    let canClick = true;

    document.getElementById('star-count').innerText = stars;

    function generateQuestion() {
        canClick = true;
        document.getElementById('feedback-msg').innerText = "";
        const a = Math.floor(Math.random() * 5) + 1;
        const b = Math.floor(Math.random() * 5) + 1;
        correctAnswer = a + b;

        document.getElementById('questionText').innerText = `${a} + ${b} = ?`;
        document.getElementById('groupA').innerText = "🍎".repeat(a);
        document.getElementById('groupB').innerText = "🍎".repeat(b);
        
        document.getElementById('timerDisplay').innerText = `Q ${currentStep}/5`;
        const bar = document.getElementById('progressBar');
        bar.innerHTML = '';
        for (let i = 1; i <= 5; i++) {
            const seg = document.createElement('div');
            seg.className = `segment ${i <= currentStep ? 'active' : ''}`;
            bar.appendChild(seg);
        }

        let options = [correctAnswer];
        while(options.length < 4) {
            let fake = Math.floor(Math.random() * 10) + 1;
            if(!options.includes(fake)) options.push(fake);
        }
        options.sort(() => Math.random() - 0.5);

        const grid = document.getElementById('options');
        grid.innerHTML = '';
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = function() { check(opt, this); };
            grid.appendChild(btn);
        });
    }

    function check(val, btn) {
        if(!canClick) return;
        const msg = document.getElementById('feedback-msg');

        if(val === correctAnswer) {
            canClick = false;
            btn.classList.add('btn-correct');
            msg.innerText = "✨ Perfect! +10 Stars";
            msg.style.color = "#16a34a";
            
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            stars += 10;
            localStorage.setItem('stars', stars);
            document.getElementById('star-count').innerText = stars;

            setTimeout(() => {
                if(currentStep < 5) {
                    currentStep++;
                    generateQuestion();
                } else {
                    msg.innerText = "🏆 You are a Math Master!";
                    setTimeout(() => {
                        fetch("/submit_score", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ game: 'math', score: 100, stars: 50, time_spent: Math.floor(performance.now() / 1000) })
                        }).then(() => {
                            window.location.href = "rewards.html";
                        });
                    }, 2000);
                }
            }, 1500);
        } else {
            btn.classList.add('btn-wrong');
            msg.innerText = "❌ Try counting again!";
            msg.style.color = "#dc2626";
            
            setTimeout(() => {
                btn.classList.remove('btn-wrong');
                msg.innerText = "";
            }, 1000);
        }
    }

    generateQuestion();

    // Hint logic
    document.addEventListener("DOMContentLoaded", () => {
        let hintsOn = localStorage.getItem('showHints');
        hintsOn = (hintsOn === null) ? true : JSON.parse(hintsOn);
        if (hintsOn) document.getElementById('hintBtn').style.display = 'block';
    });
    function showHint(msg) {
        document.getElementById('hintText').innerText = msg;
        document.getElementById('hintModal').style.display = 'flex';
    }
    function closeHint() {
        document.getElementById('hintModal').style.display = 'none';
    }
</script>

<!-- Custom Hint Modal -->
<div id="hintModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:9999; justify-content:center; align-items:center;">
    <div style="background:white; padding:30px; border-radius:24px; box-shadow:0 10px 40px rgba(0,0,0,0.25); max-width:400px; width:90%; text-align:center; transform: scale(1); animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
        <h2 style="margin-top:0; color:#2563eb; font-size:2rem; font-weight:900;">💡 HINT</h2>
        <p id="hintText" style="font-size:1.3rem; color:#475569; margin:20px 0; font-weight:800; line-height:1.5;"></p>
        <button onclick="closeHint()" style="background:#facc15; color:#1e1b4b; border:none; padding:12px 35px; border-radius:15px; font-weight:900; font-size:1.2rem; cursor:pointer; box-shadow:0 6px 0 #ca8a04; transition: all 0.2s;">Got It!</button>
    </div>
</div>

<style>
@keyframes popIn {
    0% { transform: scale(0.8); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}
</style>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play2Learn Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #a86de6, #ffcc33);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 40px;
            font-weight: 800;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
        }

        .container {
            background: #f1f1f1;
            padding: 30px;
            border-radius: 20px;
            width: 380px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .tabs {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
            background: #e2e2e2;
            padding: 5px;
            border-radius: 12px;
        }

        .tabs button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: transparent;
            font-weight: 600;
            transition: 0.3s;
            color: #666;
        }

        .tabs .active {
            background: white;
            color: #9333ea;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        label {
            font-size: 14px;
            margin-top: 15px;
            display: block;
            font-weight: 600;
            color: #444;
        }

        .required-asterisk {
            color: #ef4444;
            margin-left: 4px;
        }

        .password-container {
            position: relative;
            width: 100%;
            margin-top: 5px;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 12px;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 16px;
            color: #888;
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border-radius: 10px;
            border: 2px solid #ddd;
            outline: none;
            transition: 0.2s;
            padding-right: 40px;
            /* Leave space for eye icon in passwords */
        }

        input[type="text"],
        input[type="email"] {
            padding-right: 12px;
        }

        /* Hide Microsoft Edge native password reveal eye so it doesn't appear twice */
        input::-ms-reveal,
        input::-ms-clear {
            display: none;
        }

        /* Reset padding for non-passwords */
        input:focus {
            border-color: #9333ea;
        }

        .action-btn {
            width: 100%;
            margin-top: 25px;
            padding: 14px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(to right, #9333ea, #ec4899);
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(236, 72, 153, 0.3);
            transition: 0.3s;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(236, 72, 153, 0.4);
        }

        #signup-form {
            display: none;
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #777;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>🌈 Play2Learn 🌈</h1>
        <p>Let's Learn, Play, and Grow Together!</p>
    </div>

    <div class="container">
        <div class="tabs">
            <button id="login-tab" class="active" onclick="showForm('login')">Login</button>
            <button id="signup-tab" onclick="showForm('signup')">Sign Up</button>
        </div>

        <div id="login-form">
            <h2 style="text-align: center; color: #333;">Welcome Back!</h2>
            <label>Email Address<span class="required-asterisk">*</span></label>
            <input type="email" id="login-email" placeholder="parent@example.com" oninput="checkEmailPrompt(this)">
            <small id="login-email-prompt" style="color:#ef4444; font-size:12px; display:none; font-weight:600;">Please
                include an '@' in the email address.</small>

            <label>Password<span class="required-asterisk">*</span></label>
            <div class="password-container">
                <input type="password" id="login-password" placeholder="••••••••" style="margin-top:0;">
                <button type="button" class="toggle-password" onclick="togglePassword('login-password', this)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </button>
            </div>
            <button class="action-btn" onclick="login()">Login</button>
        </div>

        <div id="signup-form">
            <h2 style="text-align: center; color: #333;">Join the Fun!</h2>
            <label>Full Name<span class="required-asterisk">*</span></label>
            <input type="text" id="signup-name" placeholder="John Doe">

            <label>Email Address<span class="required-asterisk">*</span></label>
            <input type="email" id="signup-email" placeholder="parent@example.com" oninput="checkEmailPrompt(this)">
            <small id="signup-email-prompt" style="color:#ef4444; font-size:12px; display:none; font-weight:600;">Please
                include an '@' in the email address.</small>

            <label>Password<span class="required-asterisk">*</span></label>
            <div class="password-container">
                <input type="password" id="signup-password" placeholder="Create Password" style="margin-top:0;">
                <button type="button" class="toggle-password" onclick="togglePassword('signup-password', this)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </button>
            </div>
            <button class="action-btn" onclick="signUp()">Create Account</button>
        </div>

        <div class="footer-text" id="footer-msg">
            New user? Click Sign Up above
        </div>
    </div>

    <script>
        function showForm(type) {
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');
            const loginTab = document.getElementById('login-tab');
            const signupTab = document.getElementById('signup-tab');
            const footerMsg = document.getElementById('footer-msg');

            if (type === 'login') {
                loginForm.style.display = 'block';
                signupForm.style.display = 'none';
                loginTab.classList.add('active');
                signupTab.classList.remove('active');
                footerMsg.innerText = "New user? Click Sign Up above";
            } else {
                loginForm.style.display = 'none';
                signupForm.style.display = 'block';
                signupTab.classList.add('active');
                loginTab.classList.remove('active');
                footerMsg.innerText = "Already have an account? Log in above";
            }
        }

        async function signUp() {
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;

            if (!name || !email || !password) {
                alert("Please fill all fields!");
                return;
            }

            try {
                const res = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await res.json();

                if (data.success) {
                    window.location.href = data.redirect;
                } else {
                    alert(data.message);
                }
            } catch (err) {
                alert("Server error. Please try again.");
                console.error(err);
            }
        }

        async function login() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            if (!email || !password) {
                alert("Please enter email and password!");
                return;
            }

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (data.success) {
                    // store child name if available
                    if (data.childName) {
                        localStorage.setItem('childName', data.childName);
                    }
                    // Start the session timer for Parental Controls Time Limit
                    localStorage.setItem('sessionStartTime', Date.now());
                    window.location.href = data.redirect;
                } else {
                    alert(data.message);
                }
            } catch (err) {
                alert("Server error. Please try again.");
                console.error(err);
            }
        }

        const eyeOpenSVG = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
        const eyeClosedSVG = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;

        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                btn.innerHTML = eyeClosedSVG;
            } else {
                input.type = "password";
                btn.innerHTML = eyeOpenSVG;
            }
        }

        function checkEmailPrompt(input) {
            const val = input.value;
            const promptId = input.id + '-prompt';
            const promptEl = document.getElementById(promptId);
            if (val.length > 0 && !val.includes('@')) {
                promptEl.style.display = 'block';
            } else {
                promptEl.style.display = 'none';
            }
        }
    </script>
</body>

</html>

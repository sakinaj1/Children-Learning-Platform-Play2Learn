<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Master - KidLearn</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #d8b4fe 0%, #fbcfe8 50%, #ffffff 100%);
            --card-back: linear-gradient(180deg, #a855f7 0%, #7c3aed 100%);
            --card-front: linear-gradient(180deg, #f0fdf4 0%, #bbf7d0 100%);
            --btn-blue: #3b82f6;
            --btn-shadow-blue: #1d4ed8;
            --btn-shadow-yellow: #ca8a04;
            --btn-shadow-white: #e2e8f0;
        }

        body {
            font-family: 'Nunito', sans-serif;
            margin: 0;
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* HEADER AREA */
        .header {
            width: 95%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 20px;
        }

        .title-group h1 { color: #2563eb; margin: 0; font-size: 2.5rem; font-weight: 900; }
        .title-group p { color: #3b82f6; margin: 0; font-weight: 700; font-size: 1.2rem; }

        .stats { display: flex; gap: 15px; align-items: center; }

        /* THE UNIFIED BOX STYLE (Stars, Moves, and Home) */
        .stat-box {
            height: 50px;
            padding: 0 20px;
            border-radius: 12px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-width: 80px;
            font-size: 1.2rem;
            box-sizing: border-box;
            text-decoration: none;
            transition: transform 0.1s;
        }

        .stars { background: #facc15; color: #1e1b4b; box-shadow: 0 5px 0 var(--btn-shadow-yellow); }
        .moves { background: var(--btn-blue); color: white; box-shadow: 0 5px 0 var(--btn-shadow-blue); }
        
        .home-box { 
            background: white; 
            color: #1e1b4b; 
            box-shadow: 0 5px 0 var(--btn-shadow-white); 
            min-width: 60px;
            font-size: 1.5rem;
        }

        .stat-box:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 var(--btn-shadow-white);
        }

        /* GAME BOARD */
        .white-card {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.08);
            margin-top: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 110px);
            grid-template-rows: repeat(4, 110px);
            gap: 15px;
        }

        /* CARD ELEMENTS */
        .card {
            width: 110px; height: 110px;
            border-radius: 15px; cursor: pointer;
            position: relative; transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
        }
        .card.flipped { transform: rotateY(180deg); }

        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem;
        }

        .card-back {
            background: var(--card-back);
            color: white;
            box-shadow: 0 6px 0 #5b21b6;
            border: 2px solid #a855f7;
        }
        .card-back::after { content: "?"; font-weight: 900; opacity: 0.4; }

        .card-front {
            background: var(--card-front);
            transform: rotateY(180deg);
            border: 3px solid #22c55e;
            box-shadow: 0 6px 0 #86efac;
        }

        .card.matched { animation: success-bounce 0.5s ease; cursor: default; }
        @keyframes success-bounce { 
            0%, 100% { transform: rotateY(180deg) scale(1); } 
            50% { transform: rotateY(180deg) scale(1.15); } 
        }

        .footer-tip {
            margin-top: 30px;
            background: #dbeafe;
            color: #1e40af;
            padding: 15px 40px;
            border-radius: 20px;
            font-weight: 800;
            border: 1px solid #bfdbfe;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="title-group">
            <h1>🧠 Memory Master</h1>
            <p>Find all the matching pairs!</p>
        </div>
        <div class="stats">
            <div class="stat-box stars">⭐ <span id="starCount">0</span></div>
            <div class="stat-box moves">Moves: <span id="moveCount">0</span></div>
            <a href="games.html" class="stat-box home-box">🏠</a>
        </div>
    </div>

    <div class="white-card">
        <div class="grid" id="grid"></div>
        <div style="display:flex; justify-content:center; padding-top:20px;">
            <button class="btn" id="hintBtn" onclick="showHint('Flip the cards and remember where each animal is hiding!')" style="display:none; background:#facc15; box-shadow:0 6px 0 #ca8a04; color:#1e1b4b; font-weight:900; padding:10px 20px; border-radius:12px; border:none; cursor:pointer; font-size:1.1rem;">💡 Show Hints</button>
        </div>
    </div>

    <script>
        const emojis = ['🐱', '🐼', '🦁', '🐸', '🐷', '🦄', '🦊', '🐯'];
        const deck = [...emojis, ...emojis].sort(() => Math.random() - 0.5);

        let firstCard = null;
        let secondCard = null;
        let lockBoard = false;
        let moves = 0;
        let matches = 0;

        // Sync stars with other games
        let stars = parseInt(localStorage.getItem('stars')) || 12;
        document.getElementById('starCount').textContent = stars;

        function createBoard() {
            const grid = document.getElementById('grid');
            deck.forEach((emoji) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.emoji = emoji;
                card.innerHTML = `
                    <div class="card-front">${emoji}</div>
                    <div class="card-back"></div>
                `;
                card.addEventListener('click', flipCard);
                grid.appendChild(card);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flipped');

            if (!firstCard) {
                firstCard = this;
                return;
            }

            secondCard = this;
            updateMoves();
            checkMatch();
        }

        function checkMatch() {
            let isMatch = firstCard.dataset.emoji === secondCard.dataset.emoji;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            
            confetti({
                particleCount: 40,
                spread: 50,
                origin: { y: 0.7 }
            });
            
            // Earn stars for each match
            stars += 10;
            localStorage.setItem('stars', stars);
            document.getElementById('starCount').textContent = stars;
            
            matches++;
            if(matches === emojis.length) {
                setTimeout(() => {
                    confetti({ particleCount: 200, spread: 100 });
                    fetch("/submit_score", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ game: 'memory', score: 100, stars: 80, time_spent: Math.floor(performance.now() / 1000) })
                    }).then(() => {
                        window.location.href = "rewards.html";
                    });
                }, 500);
            }

            resetBoard();
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flipped');
                secondCard.classList.remove('flipped');
                resetBoard();
            }, 1000);
        }

        function updateMoves() {
            moves++;
            document.getElementById('moveCount').textContent = moves;
        }

        function resetBoard() {
            [firstCard, secondCard] = [null, null];
            lockBoard = false;
        }

        createBoard();

        // Hint logic
        document.addEventListener("DOMContentLoaded", () => {
            let hintsOn = localStorage.getItem('showHints');
            hintsOn = (hintsOn === null) ? true : JSON.parse(hintsOn);
            if (hintsOn) document.getElementById('hintBtn').style.display = 'block';
        });
        function showHint(msg) {
            document.getElementById('hintText').innerText = msg;
            document.getElementById('hintModal').style.display = 'flex';
        }
        function closeHint() {
            document.getElementById('hintModal').style.display = 'none';
        }
    </script>

<!-- Custom Hint Modal -->
<div id="hintModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:9999; justify-content:center; align-items:center;">
    <div style="background:white; padding:30px; border-radius:24px; box-shadow:0 10px 40px rgba(0,0,0,0.25); max-width:400px; width:90%; text-align:center; transform: scale(1); animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
        <h2 style="margin-top:0; color:#2563eb; font-size:2rem; font-weight:900;">💡 HINT</h2>
        <p id="hintText" style="font-size:1.3rem; color:#475569; margin:20px 0; font-weight:800; line-height:1.5;"></p>
        <button onclick="closeHint()" style="background:#facc15; color:#1e1b4b; border:none; padding:12px 35px; border-radius:15px; font-weight:900; font-size:1.2rem; cursor:pointer; box-shadow:0 6px 0 #ca8a04; transition: all 0.2s;">Got It!</button>
    </div>
</div>

<style>
@keyframes popIn {
    0% { transform: scale(0.8); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}
</style>

</body>
</html>

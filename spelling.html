<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KidLearn - Spelling Bee</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* MATCHING PREVIOUS GAME PALETTE */
            --bg-gradient: linear-gradient(135deg, #d8b4fe 0%, #fbcfe8 50%, #ffffff 100%);
            --primary-purple: linear-gradient(180deg, #a855f7 0%, #7c3aed 100%);
            --success-green: #22c55e;
            --accent-yellow: #facc15;
            --btn-blue: #3b82f6;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Nunito', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-canvas {
            width: 95vw;
            height: 92vh;
            background: white;
            border-radius: 30px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            padding: 30px;
            box-sizing: border-box;
            position: relative;
        }

        /* HEADER AREA - MATCHING PUZZLE MASTER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .title-group h1 {
            color: #2563eb;
            margin: 0;
            font-size: 2.2rem;
            font-weight: 900;
        }

        .title-group p {
            color: #3b82f6;
            margin: 0;
            font-weight: 700;
        }

        .stats {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .stat-box {
            padding: 8px 18px;
            border-radius: 12px;
            font-weight: 800;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 70px;
            font-size: 1.1rem;
        }

        .stars-box {
            background: var(--accent-yellow);
            color: #1e1b4b;
            box-shadow: 0 4px 0 #ca8a04;
        }

        .progress-box {
            background: var(--btn-blue);
            color: white;
            box-shadow: 0 4px 0 #1d4ed8;
        }

        .btn-home {
            background: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.4rem;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: transform 0.2s;
        }

        .btn-home:hover {
            transform: scale(1.1);
        }

        /* PROGRESS SEGMENTS */
        .progress-container {
            display: flex;
            gap: 8px;
            width: 100%;
            margin: 15px 0 25px;
        }

        .segment {
            flex: 1;
            height: 12px;
            background: #f1f5f9;
            border-radius: 10px;
            transition: 0.4s;
        }

        .segment.active {
            background: var(--success-green);
            box-shadow: 0 2px 4px rgba(34, 197, 94, 0.2);
        }

        /* MAIN CONTENT */
        .main-display {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .emoji-icon {
            font-size: 120px;
            margin-bottom: 20px;
            filter: drop-shadow(0 10px 10px rgba(0, 0, 0, 0.1));
        }

        .answer-slot {
            width: 100%;
            max-width: 500px;
            border: 4px dashed #e2e8f0;
            border-radius: 20px;
            height: 85px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 45px;
            font-weight: 900;
            letter-spacing: 10px;
            color: #1e293b;
            background: #f8fafc;
            margin-bottom: 35px;
            text-transform: uppercase;
        }

        .letter-grid {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 35px;
        }

        .letter-tile {
            width: 80px;
            height: 80px;
            background: var(--primary-purple);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 32px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 6px 0 #6d28d9;
            transition: 0.1s;
        }

        .letter-tile:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #6d28d9;
        }

        .action-btns {
            display: flex;
            gap: 20px;
        }

        .btn-action {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 900;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            color: white;
            transition: 0.2s;
        }

        .btn-clear {
            background: #ef4444;
            box-shadow: 0 5px 0 #991b1b;
        }

        .btn-submit {
            background: var(--success-green);
            width: 220px;
            box-shadow: 0 5px 0 #166534;
        }

        .btn-submit:disabled {
            background: #94a3b8;
            box-shadow: 0 5px 0 #475569;
            cursor: not-allowed;
        }

        #feedback {
            margin-top: 25px;
            height: 40px;
            font-size: 1.5rem;
            font-weight: 800;
        }
    </style>
</head>

<body>

    <div class="game-canvas">
        <div class="header">
            <div class="title-group">
                <h1>🐝 Spelling Bee</h1>
                <p>Spell the word to win!</p>
            </div>

            <div class="stats">
                <div class="stat-box stars-box">⭐ <span id="scoreDisplay">0</span></div>
                <div class="stat-box progress-box"><span id="timerDisplay">Word 1/5</span></div>
                <a href="games.html" class="btn-home">🏠</a>
            </div>
        </div>

        <div class="progress-container" id="progressBar"></div>

        <div class="main-display">
            <div class="emoji-icon" id="targetEmoji">⚽</div>
            <div class="answer-slot" id="userInputDisplay"></div>

            <div class="letter-grid" id="letterBank"></div>

            <div class="action-btns">
                <button class="btn-action btn-clear" onclick="clearInput()">Clear</button>
                <button class="btn-action" id="hintBtn" onclick="giveSpellHint()"
                    style="background:#facc15; color:#1e1b4b; box-shadow:0 5px 0 #ca8a04; display:none;">💡 Show
                    Hint</button>
                <button class="btn-action btn-submit" id="submitBtn" onclick="checkAnswer()">SUBMIT</button>
            </div>
            <div id="feedback"></div>
        </div>
    </div>

    <script>
        const gameData = [
            { word: "BALL", emoji: "⚽" },
            { word: "FISH", emoji: "🐟" },
            { word: "CAKE", emoji: "🍰" },
            { word: "FROG", emoji: "🐸" },
            { word: "BIRD", emoji: "🐦" }
        ];

        let currentStep = 0;
        let currentInput = "";
        // Load existing stars from dashboard
        let totalScore = parseInt(localStorage.getItem('stars')) || 0;
        document.getElementById('scoreDisplay').innerText = totalScore;

        function initLevel() {
            const data = gameData[currentStep];
            currentInput = "";
            document.getElementById('userInputDisplay').innerText = "";
            document.getElementById('feedback').innerText = "";
            document.getElementById('targetEmoji').innerText = data.emoji;
            document.getElementById('timerDisplay').innerText = `${currentStep + 1}/${gameData.length}`;
            document.getElementById('submitBtn').disabled = false;

            const bar = document.getElementById('progressBar');
            bar.innerHTML = '';
            gameData.forEach((_, i) => {
                const seg = document.createElement('div');
                seg.className = `segment ${i <= currentStep ? 'active' : ''}`;
                bar.appendChild(seg);
            });

            let scrambledArray;
            let isSame = true;
            while (isSame) {
                scrambledArray = data.word.split('').sort(() => Math.random() - 0.5);
                if (scrambledArray.join('') !== data.word) isSame = false;
            }

            const bank = document.getElementById('letterBank');
            bank.innerHTML = '';
            scrambledArray.forEach(char => {
                const btn = document.createElement('button');
                btn.className = 'letter-tile';
                btn.innerText = char;
                btn.onclick = () => {
                    if (currentInput.length < data.word.length) {
                        currentInput += char;
                        document.getElementById('userInputDisplay').innerText = currentInput;
                    }
                };
                bank.appendChild(btn);
            });
        }

        function clearInput() {
            currentInput = "";
            document.getElementById('userInputDisplay').innerText = "";
        }

        function checkAnswer() {
            const target = gameData[currentStep].word;
            const feedback = document.getElementById('feedback');
            const submitBtn = document.getElementById('submitBtn');

            if (currentInput === target) {
                submitBtn.disabled = true;
                confetti({
                    particleCount: 150,
                    spread: 70,
                    origin: { y: 0.6 }
                });

                feedback.innerText = "✨ Perfect! Next word...";
                feedback.style.color = "#22c55e";

                totalScore += 10;
                localStorage.setItem('stars', totalScore);
                document.getElementById('scoreDisplay').innerText = totalScore;

                setTimeout(() => {
                    currentStep++;
                    if (currentStep < gameData.length) {
                        initLevel();
                    } else {
                        showGameOver();
                    }
                }, 2000);

            } else {
                feedback.innerText = "❌ Try again!";
                feedback.style.color = "#ef4444";
                setTimeout(() => { feedback.innerText = ""; }, 1200);
            }
        }

        function showGameOver() {
            document.querySelector('.main-display').innerHTML = `
            <div style="text-align:center">
                <h1 style="font-size:60px; color:#1e293b; margin-bottom:10px;">🏆 CHAMPION!</h1>
                <p style="font-size:30px; font-weight:800; color:#7c3aed;">Saving progress...</p>
            </div>
        `;
            setTimeout(() => {
                fetch("/submit_score", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ game: 'spelling', score: 100, stars: 50, time_spent: Math.floor(performance.now() / 1000) })
                }).then(() => {
                    window.location.href = "rewards.html";
                });
            }, 1500);
        }

        initLevel();

        // Hint logic
        document.addEventListener("DOMContentLoaded", () => {
            let hintsOn = localStorage.getItem('showHints');
            hintsOn = (hintsOn === null) ? true : JSON.parse(hintsOn);
            if (hintsOn) document.getElementById('hintBtn').style.display = 'block';
        });

        function giveSpellHint() {
            const target = gameData[currentStep].word;
            const currentLen = currentInput.length;
            if (currentLen === 0) {
                showHint("Start with the letter '" + target[0] + "'!");
            } else if (currentLen < target.length) {
                showHint("You have '" + currentInput + "'. The next letter is '" + target[currentLen] + "'!");
            } else {
                if (currentInput === target) {
                    showHint("Looks perfect! Click SUBMIT!");
                } else {
                    showHint("Hmm, something's not quite right. Try clearing and start with '" + target[0] + "'!");
                }
            }
        }

        function showHint(msg) {
            document.getElementById('hintText').innerText = msg;
            document.getElementById('hintModal').style.display = 'flex';
        }
        function closeHint() {
            document.getElementById('hintModal').style.display = 'none';
        }
    </script>

    <!-- Custom Hint Modal -->
    <div id="hintModal"
        style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:9999; justify-content:center; align-items:center;">
        <div
            style="background:white; padding:30px; border-radius:24px; box-shadow:0 10px 40px rgba(0,0,0,0.25); max-width:400px; width:90%; text-align:center; transform: scale(1); animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
            <h2 style="margin-top:0; color:#2563eb; font-size:2rem; font-weight:900;">💡 HINT</h2>
            <p id="hintText" style="font-size:1.3rem; color:#475569; margin:20px 0; font-weight:800; line-height:1.5;">
            </p>
            <button onclick="closeHint()"
                style="background:#facc15; color:#1e1b4b; border:none; padding:12px 35px; border-radius:15px; font-weight:900; font-size:1.2rem; cursor:pointer; box-shadow:0 6px 0 #ca8a04; transition: all 0.2s;">Got
                It!</button>
        </div>
    </div>

    <style>
        @keyframes popIn {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>

</body>

</html>
